<div class="product-card">
    <a href="{% url 'catalog:product_detail' product.pk %}" class="product-card-link">
        <div class="product-image">
            {% if product.main_image and product.main_image.image %}
                <img src="{{ product.main_image.image.url }}"
                     alt="{{ product.main_image.alt|default:product.name }}"
                     loading="lazy">
            {% elif product.main_image and product.main_image.video %}
                <video src="{{ product.main_image.video.url }}"
                       autoplay muted loop playsinline
                       style="width:100%;height:100%;object-fit:cover;">
                </video>
            {% else %}
                <div class="product-image-placeholder">
                    <span>Фото скоро</span>
                </div>
            {% endif %}
            <div class="product-overlay">
                <span>{{ product.name }}</span>
            </div>
        </div>
    </a>
    <div class="product-info">
        {% if product.price %}
        <p class="price">{{ product.price }} ₽/кг</p>
        {% else %}
        <p class="price price--request">По запросу</p>
        {% endif %}
        <a href="{% url 'catalog:product_detail' product.pk %}" class="btn btn-primary">Подробнее</a>
    </div>
</div>
