{% load static %}
<header class="header">
    <div class="container">
        <nav class="navbar">
            <!-- Logo -->
            <a href="{% url 'core:home' %}" class="navbar-brand">
                {% comment %} <span class="brand-icon">🎂</span> {% endcomment %}
                <img src="{% static 'img/tady_peceme.svg' %}" class="navbar-icon" alt="Tady Peceme Logo">
                <span class="brand-text">Tadypeceme</span>
            </a>

            <!-- Mobile Menu Toggle -->
            <button class="navbar-toggler" type="button" aria-label="Toggle navigation">
                <span class="navbar-toggler-icon"></span>
            </button>

            <!-- Navigation Menu -->
            <div class="navbar-menu">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a href="{% url 'core:home' %}" class="nav-link {% if request.resolver_match.url_name == 'home' %}active{% endif %}">
                            Главная
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'core:about' %}" class="nav-link {% if request.resolver_match.url_name == 'about' %}active{% endif %}">
                            Обо мне
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'catalog:product_list' %}" class="nav-link {% if request.resolver_match.url_name == 'product_list' %}active{% endif %}">
                            Начинки
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'catalog:portfolio' %}" class="nav-link {% if request.resolver_match.url_name == 'portfolio' %}active{% endif %}">
                            Портфолио
                        </a>
                    </li>
                    <li class="nav-item">
                        <a href="{% url 'core:contacts' %}" class="nav-link {% if request.resolver_match.url_name == 'contacts' %}active{% endif %}">
                            Контакты
                        </a>
                    </li>
                </ul>

                <!-- Auth + CTA -->
                <div class="navbar-actions">
                    {% if user.is_authenticated %}
                    <a href="{% url 'core:profile' %}" class="nav-link nav-link--profile">
                        {{ user.name }}
                    </a>
                    {% else %}
                    <a href="{% url 'core:login' %}" class="nav-link {% if request.resolver_match.url_name == 'login' %}active{% endif %}">
                        Войти
                    </a>
                    {% endif %}
                    <a href="{% url 'orders:order_create' %}" class="btn btn-primary btn-order">
                        Заказать торт
                    </a>
                </div>
            </div>
        </nav>
    </div>
</header>
